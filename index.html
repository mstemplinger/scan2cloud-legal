<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Scan2Cloud – Rechtliches</title>
<style>
  :root { --accent:#5b3ceb; --accent2:#2666f5; --bg:#f6f7fb; --card:#fff; --text:#1c1e26; --muted:#5c6270; --border:#e6e8ef; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; background:var(--bg); color:var(--text); line-height:1.65; }
  .wrap { max-width:600px; margin:0 auto; padding:48px 20px 80px; }
  header.app { display:flex; align-items:center; gap:14px; margin-bottom:24px; }
  .logo { width:52px; height:52px; border-radius:13px; background:linear-gradient(135deg,var(--accent2),var(--accent)); flex:0 0 auto; }
  h1 { font-size:1.7rem; margin:.2em 0; }
  .muted { color:var(--muted); }
  a.doc { display:block; background:var(--card); border:1px solid var(--border); border-radius:14px; padding:18px 20px; margin-top:14px; text-decoration:none; color:var(--text); font-weight:600; box-shadow:0 1px 3px rgba(20,25,60,.04); }
  a.doc:hover { border-color:var(--accent); }
  a.doc span { display:block; font-weight:400; font-size:.9rem; color:var(--muted); margin-top:3px; }
  footer { margin-top:40px; color:var(--muted); font-size:.85rem; text-align:center; }
</style>
</head>
<body>
<div class="wrap">
  <header class="app"><div class="logo"></div><div><h1>Scan2Cloud</h1><div class="muted">Rechtliche Dokumente</div></div></header>

  <a class="doc" href="datenschutz.html">Datenschutzerklärung<span>Wie die App mit deinen Daten umgeht</span></a>
  <a class="doc" href="nutzungsbedingungen.html">Nutzungsbedingungen<span>Bedingungen zur Nutzung der App</span></a>
  <a class="doc" href="impressum.html">Impressum<span>Anbieterkennzeichnung</span></a>

  <footer>Scan2Cloud – Dokumente scannen und in OneDrive/OneNote ablegen.</footer>
</div>
</body>
</html>
